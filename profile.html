<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Profile | TaskFlow</title>
    <link rel="stylesheet" href="css/profile-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@5.2.10/dist/amazon-cognito-identity.min.js"></script>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1305.0.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">TaskFlow</div>
            <div class="dropdown">
                <button class="dropdown-toggle" id="dropdown-toggle" aria-haspopup="true" aria-expanded="false">
                    <i class="fas fa-user-circle"></i>
                    <i class="fas fa-chevron-down dropdown-chevron"></i>
                </button>
                <div class="dropdown-menu" id="dropdown-menu">
                    <a href="dashboard.html"><i class="fas fa-home"></i> Home</a>
                    <a href="profile.html" class="active"><i class="fas fa-user"></i> Profile</a>
                    <button class="dropdown-item" id="theme-toggle">
                        <i class="fas fa-moon"></i> <span>Dark Mode</span>
                    </button>
                    <a href="#" id="logoutBtn" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="profile-page-wrapper">
        <div class="profile-container">
            <div class="profile-header-meta">
                <h2 class="section-title">Account Settings</h2>
                <p class="section-subtitle">Manage your profile metadata and personalization options.</p>
            </div>

            <div class="profile-card main-info-card">
                <div class="avatar-management-pane">
                    <div class="profile-pic-wrapper">
                        <img id="profilePic" src="images/default-profile.png" alt="Profile Picture">
                        <input type="file" id="fileInput" accept="image/*" hidden>
                        <label for="fileInput" class="avatar-edit-badge" title="Change Photo">
                            <i class="fas fa-camera"></i>
                        </label>
                    </div>
                    <div class="avatar-meta-text">
                        <h3>Profile Image</h3>
                        <p>PNG or JPG up to 2MB.</p>
                    </div>
                    <button id="uploadBtn" class="upload-btn primary-button">
                        <i class="fas fa-cloud-upload-alt"></i> Save Image
                    </button>
                    <div id="uploadStatus" class="status-message"></div>
                </div>

                <div class="profile-details-pane">
                    <div class="detail-item">
                        <div class="icon-avatar-badge"><i class="fas fa-user"></i></div>
                        <div class="detail-content">
                            <span class="detail-label">Username</span>
                            <span id="username" class="detail-value">Loading...</span>
                        </div>
                    </div>
                    
                    <div class="detail-item">
                        <div class="icon-avatar-badge"><i class="fas fa-envelope"></i></div>
                        <div class="detail-content">
                            <span class="detail-label">Email Address</span>
                            <span id="email" class="detail-value">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/profile.js"></script>
    <script src="js/dropdown.js"></script>
    <script src="js/settings-profile.js"></script>
</body>
</html>
